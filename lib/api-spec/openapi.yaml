openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ocean Weligama API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rooms
    description: Room and villa operations
  - name: services
    description: Service operations
  - name: bookings
    description: Booking operations
  - name: reviews
    description: Guest review operations
  - name: gallery
    description: Gallery operations
  - name: content
    description: CMS content operations
  - name: contact
    description: Contact form operations
  - name: analytics
    description: Analytics tracking
  - name: admin-auth
    description: Admin authentication
  - name: admin-bookings
    description: Admin booking management
  - name: admin-rooms
    description: Admin room management
  - name: admin-services
    description: Admin service management
  - name: admin-reviews
    description: Admin review management
  - name: admin-analytics
    description: Admin analytics
  - name: admin-messages
    description: Admin message management
  - name: admin-pricing
    description: Admin pricing management
  - name: admin-availability
    description: Admin availability management
  - name: admin-gallery
    description: Admin gallery moderation
  - name: blogs
    description: Blog operations
  - name: admin-blogs
    description: Admin blog management
  - name: airport-pricing
    description: Public airport transfer pricing information
  - name: admin-airport-pricing
    description: Admin airport transfer pricing management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # PUBLIC ROOMS
  /v1/rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List active rooms with optional filters
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [room, villa, dormitory, suite]
        - name: guests
          in: query
          schema:
            type: integer
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: locale
          in: query
          schema:
            type: string
            default: en
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"

  /v1/rooms/featured:
    get:
      operationId: listFeaturedRooms
      tags: [rooms]
      summary: List featured rooms for the home page
      parameters:
        - name: locale
          in: query
          schema:
            type: string
            default: en
      responses:
        "200":
          description: Featured rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"

  /v1/rooms/{slug}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get room detail by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: locale
          in: query
          schema:
            type: string
            default: en
      responses:
        "200":
          description: Room detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomDetail"
        "404":
          description: Room not found

  /v1/rooms/{slug}/availability:
    get:
      operationId: getRoomAvailability
      tags: [rooms]
      summary: Get availability calendar for a room
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Availability data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilityDay"

  # PUBLIC SERVICES
  /v1/services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all active services
      parameters:
        - name: locale
          in: query
          schema:
            type: string
            default: en
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /v1/services/{slug}:
    get:
      operationId: getService
      tags: [services]
      summary: Get service detail by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: locale
          in: query
          schema:
            type: string
            default: en
      responses:
        "200":
          description: Service detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  # PUBLIC BOOKINGS
  /v1/bookings/check:
    post:
      operationId: checkAvailabilityAndPrice
      tags: [bookings]
      summary: Check availability and get price quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCheck"
      responses:
        "200":
          description: Price quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingQuote"

  /v1/bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error or unavailable

  /v1/bookings/{reference}:
    get:
      operationId: getBookingByReference
      tags: [bookings]
      summary: Get booking by reference number (public confirmation)
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Booking not found

  # PUBLIC REVIEWS
  /v1/reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List approved guest reviews
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewList"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a new guest review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCreate"
      responses:
        "201":
          description: Review submitted (pending approval)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /v1/reviews/summary:
    get:
      operationId: getReviewSummary
      tags: [reviews]
      summary: Get aggregate review statistics
      responses:
        "200":
          description: Review summary with average ratings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewSummary"

  # PUBLIC GALLERY
  /v1/gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List gallery items
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 24
      responses:
        "200":
          description: Gallery items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryItem"
    post:
      operationId: createGalleryItem
      tags: [gallery]
      summary: Submit a new gallery image (tourist upload)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryInput"
      responses:
        "201":
          description: Gallery image submitted (pending approval)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryItem"

  # CMS CONTENT
  /v1/content/{key}:
    get:
      operationId: getContent
      tags: [content]
      summary: Get CMS content by key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: locale
          in: query
          schema:
            type: string
            default: en
      responses:
        "200":
          description: Content value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"

  # CONTACT
  /v1/contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Message submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResult"

  # ANALYTICS
  /v1/analytics/track:
    post:
      operationId: trackPageView
      tags: [analytics]
      summary: Track a page view (cookieless)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PageViewInput"
      responses:
        "200":
          description: Tracked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackResult"

  # ADMIN AUTH
  /v1/admin/auth/login:
    post:
      operationId: adminLogin
      tags: [admin-auth]
      summary: Admin login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "401":
          description: Invalid credentials

  /v1/admin/auth/logout:
    post:
      operationId: adminLogout
      tags: [admin-auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /v1/admin/auth/me:
    get:
      operationId: adminGetMe
      tags: [admin-auth]
      summary: Get current admin user
      responses:
        "200":
          description: Current admin user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized

  # ADMIN BOOKINGS
  /v1/admin/bookings:
    get:
      operationId: adminListBookings
      tags: [admin-bookings]
      summary: List all bookings with filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Admin bookings list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBookingList"

  /v1/admin/bookings/{id}:
    get:
      operationId: adminGetBooking
      tags: [admin-bookings]
      summary: Get booking detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    patch:
      operationId: adminUpdateBooking
      tags: [admin-bookings]
      summary: Update booking status or notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    delete:
      operationId: adminDeleteBooking
      tags: [admin-bookings]
      summary: Soft delete booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # ADMIN ROOMS
  /v1/admin/rooms:
    get:
      operationId: adminListRooms
      tags: [admin-rooms]
      summary: List all rooms including inactive
      responses:
        "200":
          description: All rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: adminCreateRoom
      tags: [admin-rooms]
      summary: Create new room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /v1/admin/rooms/{id}:
    patch:
      operationId: adminUpdateRoom
      tags: [admin-rooms]
      summary: Update room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomUpdate"
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
    delete:
      operationId: adminDeleteRoom
      tags: [admin-rooms]
      summary: Soft delete room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # ADMIN SERVICES
  /v1/admin/services:
    get:
      operationId: adminListServices
      tags: [admin-services]
      summary: List all services
      responses:
        "200":
          description: All services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: adminCreateService
      tags: [admin-services]
      summary: Create service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /v1/admin/services/{id}:
    patch:
      operationId: adminUpdateService
      tags: [admin-services]
      summary: Update service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: adminDeleteService
      tags: [admin-services]
      summary: Delete service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  # ADMIN REVIEWS
  /v1/admin/reviews:
    get:
      operationId: adminListReviews
      tags: [admin-reviews]
      summary: List all reviews including unapproved
      responses:
        "200":
          description: All reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /v1/admin/reviews/{id}:
    patch:
      operationId: adminUpdateReview
      tags: [admin-reviews]
      summary: Approve, reply to, or feature a review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUpdate"
      responses:
        "200":
          description: Updated review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
    delete:
      operationId: adminDeleteReview
      tags: [admin-reviews]
      summary: Delete a review permanently
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # ADMIN GALLERY
  /v1/admin/gallery:
    get:
      operationId: adminListGallery
      tags: [admin-gallery]
      summary: List all gallery items including pending
      responses:
        "200":
          description: All gallery items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryItem"

  /v1/admin/gallery/{id}/status:
    patch:
      operationId: adminUpdateGalleryStatus
      tags: [admin-gallery]
      summary: Approve or reject a gallery image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryUpdate"
      responses:
        "200":
          description: Updated gallery item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryItem"

  /v1/admin/gallery/{id}:
    delete:
      operationId: adminDeleteGalleryItem
      tags: [admin-gallery]
      summary: Delete a gallery image permanently
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # ADMIN ANALYTICS
  /v1/admin/analytics/dashboard:
    get:
      operationId: adminGetDashboard
      tags: [admin-analytics]
      summary: Get dashboard metrics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

  /v1/admin/analytics/bookings-trend:
    get:
      operationId: adminGetBookingsTrend
      tags: [admin-analytics]
      summary: Booking trend data
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Booking trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"

  /v1/admin/analytics/upcoming-checkins:
    get:
      operationId: adminGetUpcomingCheckins
      tags: [admin-analytics]
      summary: Upcoming check-ins for the next 7 days
      responses:
        "200":
          description: Upcoming checkins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  # ADMIN MESSAGES
  /v1/admin/messages:
    get:
      operationId: adminListMessages
      tags: [admin-messages]
      summary: List contact messages
      parameters:
        - name: isRead
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactMessage"

  /v1/admin/messages/{id}:
    patch:
      operationId: adminUpdateMessage
      tags: [admin-messages]
      summary: Mark message read or replied
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageUpdate"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"
    delete:
      operationId: adminDeleteMessage
      tags: [admin-messages]
      summary: Delete a message permanently
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /v1/admin/airport-pricing:
    put:
      operationId: adminUpdateAirportPricing
      tags: [admin-airport-pricing]
      summary: Update airport transfer pricing settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AirportPricingInput"
      responses:
        "200":
          description: Updated pricing settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AirportPricing"

  # ADMIN PRICING
  /v1/admin/pricing:
    get:
      operationId: adminListPricingRules
      tags: [admin-pricing]
      summary: List all pricing rules
      responses:
        "200":
          description: Pricing rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PricingRule"
    post:
      operationId: adminCreatePricingRule
      tags: [admin-pricing]
      summary: Create pricing rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricingRuleInput"
      responses:
        "201":
          description: Created pricing rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingRule"

  /v1/admin/pricing/{id}:
    patch:
      operationId: adminUpdatePricingRule
      tags: [admin-pricing]
      summary: Update pricing rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricingRuleUpdate"
      responses:
        "200":
          description: Updated pricing rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingRule"
    delete:
      operationId: adminDeletePricingRule
      tags: [admin-pricing]
      summary: Delete pricing rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # ADMIN AVAILABILITY
  /v1/admin/availability/{roomId}:
    get:
      operationId: adminGetRoomAvailability
      tags: [admin-availability]
      summary: Get room availability calendar
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Availability
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilityDay"

  /v1/admin/availability/block:
    post:
      operationId: adminBlockDates
      tags: [admin-availability]
      summary: Block dates for a room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockDatesInput"
      responses:
        "201":
          description: Dates blocked

  /v1/upload:
    post:
      operationId: uploadFile
      tags: [public]
      summary: Upload a file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string

  /v1/admin/availability/{id}:
    delete:
      operationId: adminUnblockDate
      tags: [admin-availability]
      summary: Unblock a date
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unblocked

  /v1/airport-pricing:
    get:
      operationId: getAirportPricing
      tags: [airport-pricing]
      summary: Get active airport transfer pricing
      responses:
        "200":
          description: Airport transfer pricing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AirportPricing"

  # PUBLIC BLOGS
  /v1/blogs:
    get:
      operationId: listBlogs
      tags: [blogs]
      summary: List active blogs
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of blogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"

  /v1/blogs/{id}:
    get:
      operationId: getBlog
      tags: [blogs]
      summary: Get blog detail by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"

  # ADMIN BLOGS
  /v1/admin/blogs:
    get:
      operationId: adminListBlogs
      tags: [admin-blogs]
      summary: List all blogs for admin
      responses:
        "200":
          description: All blogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"
    post:
      operationId: adminCreateBlog
      tags: [admin-blogs]
      summary: Create new blog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogInput"
      responses:
        "201":
          description: Blog created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"

  /v1/admin/blogs/{id}:
    patch:
      operationId: adminUpdateBlog
      tags: [admin-blogs]
      summary: Update blog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogUpdate"
      responses:
        "200":
          description: Updated blog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
    delete:
      operationId: adminDeleteBlog
      tags: [admin-blogs]
      summary: Delete blog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

